<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Panitia - OCM</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: sans-serif;
            background: #0f172a;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── Scanner viewfinder ── */
        #reader-wrapper {
            width: 100%;
            max-width: 500px;
            background: #000;
            border-radius: 0 0 24px 24px;
            overflow: hidden;
            position: relative;
        }
        #reader { width: 100%; }

        /* Corner guides overlay */
        .scan-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .scan-box {
            width: 220px; height: 220px;
            position: relative;
        }
        .scan-box::before, .scan-box::after,
        .scan-box .corner-br, .scan-box .corner-bl {
            content: '';
            position: absolute;
            width: 28px; height: 28px;
            border-color: #10b981;
            border-style: solid;
        }
        .scan-box::before  { top: 0;    left: 0;  border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
        .scan-box::after   { top: 0;    right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
        .scan-box .corner-br { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
        .scan-box .corner-bl { bottom: 0; left: 0;  border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }

        /* ── Status bar ── */
        #status-bar {
            width: 100%;
            max-width: 500px;
            padding: 14px 20px;
            background: #1e293b;
            font-size: 13px;
            color: #94a3b8;
            text-align: center;
            border-bottom: 1px solid #334155;
            min-height: 48px;
        }

        /* ── Result card ── */
        .result-box {
            width: calc(100% - 40px);
            max-width: 460px;
            margin: 20px 0 0;
            padding: 24px 20px;
            border-radius: 20px;
            display: none;
            animation: slideUp .3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(16px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        .result-box h2   { margin: 0 0 8px; font-size: 22px; }
        .result-box .name { margin: 0; font-size: 20px; font-weight: 700; }
        .result-box .pax  { margin: 6px 0 0; font-size: 14px; opacity: .85; }

        .res-success { background: #065f46; border: 2px solid #10b981; }
        .res-warning { background: #92400e; border: 2px solid #fbbf24; }
        .res-error   { background: #7f1d1d; border: 2px solid #f87171; }

        /* ── Scan again button ── */
        .btn-scan {
            margin: 20px 0;
            padding: 14px 36px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: background .2s;
        }
        .btn-scan:hover { background: #2563eb; }

        /* ── Login overlay ── */
        #login-overlay {
            position: fixed; inset: 0;
            background: #0f172a;
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #1e293b;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,.5);
            width: 85%;
            max-width: 340px;
            text-align: center;
        }
        .login-card h2 { margin: 8px 0 4px; color: #f8fafc; }
        .login-card p  { color: #94a3b8; font-size: 14px; margin: 0 0 20px; }
        .login-card input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1.5px solid #334155;
            background: #0f172a;
            color: white;
            text-align: center;
            font-size: 20px;
            letter-spacing: 6px;
            margin-bottom: 14px;
        }
        .login-card input:focus { outline: none; border-color: #10b981; }
        .login-card button {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: #059669;
            color: white;
            font-weight: 800;
            cursor: pointer;
            font-size: 16px;
            transition: background .2s;
        }
        .login-card button:hover { background: #047857; }
        #login-err { color: #f87171; font-size: 13px; margin-top: 12px; display: none; }
    </style>
</head>
<body>

<!-- Login Overlay -->
<div id="login-overlay">
    <div class="login-card">
        <div style="font-size:52px">🕌</div>
        <h2>Panitia EID 2026</h2>
        <p>Masukkan password scanner</p>
        <input type="password" id="passInput" placeholder="••••••••"
               onkeydown="if(event.key==='Enter') checkLogin()">
        <button onclick="checkLogin()">MASUK SCANNER</button>
        <p id="login-err">⚠️ Password salah!</p>
    </div>
</div>

<!-- Main Content -->
<div id="reader-wrapper">
    <div id="reader"></div>
    <div class="scan-overlay">
        <div class="scan-box">
            <div class="corner-br"></div>
            <div class="corner-bl"></div>
        </div>
    </div>
</div>

<div id="status-bar">Menunggu login…</div>

<div id="result" class="result-box">
    <h2 id="res-title"></h2>
    <p  id="res-name" class="name"></p>
    <p  id="res-pax"  class="pax"></p>
</div>

<button class="btn-scan" onclick="restartScanner()">
    <i class="fas fa-qrcode"></i> Scan Berikutnya
</button>

<!-- Suara feedback -->
<audio id="snd-success" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" preload="auto"></audio>
<audio id="snd-warning" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" preload="auto"></audio>
<audio id="snd-error"   src="https://assets.mixkit.co/active_storage/sfx/2012/2012-preview.mp3" preload="auto"></audio>

<script>
    // =============================================
    // KONFIGURASI — SCRIPT_URL sama dengan index.html & admin.html
    // =============================================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxdgqlGxEPmxp5BXoNCJTEkmNTqG70MA4sojFPMZfJgtmUanvfj9R9sVaGFtV2Xf8Y6/exec";

    // Password disimpan sebagai SHA-256 hash, bukan plaintext
    // Hash dari "mco2026" — cara ganti: lihat komentar di admin.html
    const PASS_HASH = "b0d6f305e9e5f4282bffaaecf9abf30f1a05ac820de25d3da5efde4be9e0bc33";

    const html5QrCode = new Html5Qrcode("reader");
    const statusBar   = document.getElementById("status-bar");
    const resultDiv   = document.getElementById("result");

    // =============================================
    // LOGIN
    // =============================================
    async function checkLogin() {
        const input = document.getElementById("passInput").value;
        const hash  = await sha256(input);

        if (hash === PASS_HASH) {
            document.getElementById("login-overlay").style.display = "none";
            startScanner();
        } else {
            document.getElementById("login-err").style.display = "block";
            playSound("error");
        }
    }

    async function sha256(str) {
        const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
        return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, "0")).join("");
    }

    // =============================================
    // SUARA
    // =============================================
    function playSound(type) {
        const snd = document.getElementById("snd-" + type);
        if (!snd) return;
        snd.currentTime = 0;
        snd.play().catch(() => {}); // Safari butuh user gesture; silent fail
    }

    // =============================================
    // SCAN SUCCESS CALLBACK
    // =============================================
    let isProcessing = false; // cegah double-scan

    const onScanSuccess = (decodedText) => {
        if (isProcessing) return;
        isProcessing = true;
        html5QrCode.pause(true);

        // Sanitasi: hanya tampilkan karakter aman di status bar
        const safeText = decodedText.replace(/[<>"'&]/g, "");
        statusBar.textContent = "🔍 Mengecek: " + safeText;

        fetch(`${SCRIPT_URL}?action=verifyQR&qrData=${encodeURIComponent(decodedText)}`)
            .then(res => res.json())
            .then(data => {
                resultDiv.style.display = "block";

                if (data.status === "success") {
                    playSound("success");
                    resultDiv.className = "result-box res-success";
                    // Gunakan textContent (bukan innerHTML) untuk mencegah XSS
                    document.getElementById("res-title").textContent = "✅ BERHASIL";
                    document.getElementById("res-name").textContent  = data.nama  ?? "—";
                    document.getElementById("res-pax").textContent   = "Total Jemaah: " + (data.pax ?? "?") + " Orang";

                } else if (data.status === "duplicate") {
                    playSound("warning");
                    resultDiv.className = "result-box res-warning";
                    document.getElementById("res-title").textContent = "⚠️ SUDAH HADIR";
                    document.getElementById("res-name").textContent  = data.data?.nama ?? "—";
                    document.getElementById("res-pax").textContent   = "ID ini sudah scan sebelumnya.";

                } else {
                    playSound("error");
                    resultDiv.className = "result-box res-error";
                    document.getElementById("res-title").textContent = "❌ TIDAK DIKENAL";
                    document.getElementById("res-name").textContent  = "ID Tidak Terdaftar";
                    document.getElementById("res-pax").textContent   = "QR Code tidak valid atau salah.";
                }

                // Auto-scan ulang setelah 4 detik
                setTimeout(restartScanner, 4000);
            })
            .catch(() => {
                statusBar.textContent = "⚠️ Gagal koneksi. Coba lagi.";
                playSound("error");
                setTimeout(restartScanner, 3000);
            });
    };

    // =============================================
    // START SCANNER
    // =============================================
    function startScanner() {
        statusBar.textContent = "📷 Kamera aktif — arahkan QR ke kotak hijau";
        html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 220, height: 220 } },
            onScanSuccess
        ).catch(() => {
            statusBar.textContent = "❌ Gagal akses kamera. Pastikan izin sudah diberikan.";
        });
    }

    function restartScanner() {
        resultDiv.style.display = "none";
        isProcessing = false;
        html5QrCode.resume();
        statusBar.textContent = "✅ Siap — scan jemaah berikutnya";
    }
</script>

</body>
</html>
