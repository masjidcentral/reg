<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pendaftaran Berhasil — EID 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
:root {
  --green-deep: #064e3b;
  --green-mid: #059669;
  --green-bright: #10b981;
  --green-light: #ecfdf5;
  --cream: #f1f5f9;
  --ink: #1e293b;
  --muted: #475569;
  --border: #e2e8f0;
  --radius: 24px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 16px 48px;
  position: relative;
  overflow-x: hidden;
}

/* Decorative background pattern */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle at 15% 20%, rgba(5,150,105,0.06) 0%, transparent 50%),
    radial-gradient(circle at 85% 80%, rgba(16,185,129,0.06) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* Main card */
.card {
  width: 100%;
  max-width: 480px;
  background: #fff;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  position: relative;
  z-index: 1;
  overflow: hidden;
  box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
}

/* Green top bar */
.card-header {
  background: linear-gradient(135deg, var(--green-deep) 0%, var(--green-mid) 100%);
  padding: 28px 28px 24px;
  text-align: center;
  position: relative;
}

.card-header::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0; right: 0;
  height: 24px;
  background: #fff;
  border-radius: 24px 24px 0 0;
}

.check-ring {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  border: 2px solid rgba(255,255,255,0.3);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 12px;
  font-size: 28px;
}

.card-header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  color: #fff;
  letter-spacing: -0.01em;
}

.card-header .subtitle {
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  margin-top: 4px;
}

/* Card body */
.card-body {
  padding: 24px 24px 28px;
}

/* ID Badge */
.id-badge {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--green-light);
  border: 1.5px solid var(--green-bright);
  border-radius: 14px;
  padding: 12px 16px;
  margin-bottom: 20px;
}

.id-badge .badge-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--green-deep);
  letter-spacing: .08em;
  text-transform: uppercase;
}

.id-badge .badge-value {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  color: var(--green-deep);
  letter-spacing: .04em;
}

.id-badge .badge-icon {
  font-size: 20px;
  color: var(--green-bright);
}

/* Info grid */
.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 22px;
}

.info-item {
  background: #f8fafc;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 14px;
}

.info-item.full { grid-column: 1 / -1; }

.info-item .lbl {
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: .06em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 4px;
}

.info-item .lbl i { color: var(--green-bright); font-size: 10px; }

.info-item .val {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  word-break: break-word;
}

/* Divider */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 4px 0 20px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .06em;
  text-transform: uppercase;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* QR section */
.qr-section {
  text-align: center;
  margin-bottom: 22px;
}

.qr-frame {
  width: 190px; height: 190px;
  margin: 0 auto 14px;
  background: #fff;
  border: 2px solid var(--border);
  border-radius: 20px;
  padding: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  position: relative;
}

.qr-frame::before, .qr-frame::after {
  content: '';
  position: absolute;
  width: 20px; height: 20px;
  border-color: var(--green-bright);
  border-style: solid;
}
.qr-frame::before { top: 8px; left: 8px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
.qr-frame::after  { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }

.qr-frame img { width: 100%; height: 100%; object-fit: contain; }

.qr-note {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.6;
  max-width: 280px;
  margin: 0 auto;
}

/* Buttons */
.btn-group {
  display: flex;
  gap: 10px;
}

.btn {
  flex: 1;
  padding: 14px;
  border-radius: 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  text-decoration: none;
  transition: all .2s ease;
}

.btn-primary {
  background: linear-gradient(135deg, var(--green-mid), var(--green-deep));
  color: #fff;
  box-shadow: 0 4px 12px rgba(5,150,105,0.3);
}

.btn-secondary {
  background: #fff;
  color: var(--muted);
  border: 1.5px solid var(--border);
}

/* Footer inside card */
.card-footer {
  background: var(--green-deep);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.card-footer span {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  letter-spacing: .04em;
}

.card-footer .dot {
  width: 3px; height: 3px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
}

#downloadCanvas { display: none; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.card { animation: fadeUp .5s ease both; }

@media(max-width:400px){
  .btn-group { flex-direction: column-reverse; }
  .info-grid { grid-template-columns: 1fr; }
  .info-item.full { grid-column: auto; }
}
</style>
</head>

<body>

<div class="card" id="mainCard">
  <div class="card-header">
    <div class="check-ring">✅</div>
    <h1 id="headTitle">Pendaftaran Berhasil</h1>
    <div class="subtitle" id="headSub">Okayama Central Mosque — EID 2026</div>
  </div>

  <div class="card-body">
    <div class="id-badge">
      <div>
        <div class="badge-label" id="lblParticipantId">ID Peserta</div>
        <div class="badge-value" id="resID">—</div>
      </div>
      <div class="badge-icon"><i class="fas fa-ticket-alt"></i></div>
    </div>

    <div class="info-grid">
      <div class="info-item full">
        <div class="lbl"><i class="fas fa-user"></i> <span id="lblNama">Nama</span></div>
        <div class="val" id="resNama">—</div>
      </div>
      <div class="info-item">
        <div class="lbl"><i class="fas fa-envelope"></i> Email</div>
        <div class="val" id="resEmail">—</div>
      </div>
      <div class="info-item">
        <div class="lbl"><i class="fas fa-phone"></i> <span id="lblHP">No. HP</span></div>
        <div class="val" id="resHP">—</div>
      </div>
      <div class="info-item">
        <div class="lbl"><i class="fas fa-map-marker-alt"></i> <span id="lblDomisili">Domisili</span></div>
        <div class="val" id="resDomisili">—</div>
      </div>
      <div class="info-item">
        <div class="lbl"><i class="fas fa-birthday-cake"></i> <span id="lblUsia">Usia</span></div>
        <div class="val" id="resUsia">—</div>
      </div>
      <div class="info-item">
        <div class="lbl"><i class="fas fa-venus-mars"></i> <span id="lblJK">Jenis Kelamin</span></div>
        <div class="val" id="resJK">—</div>
      </div>
      <div class="info-item full">
        <div class="lbl"><i class="fas fa-users"></i> <span id="lblJumlah">Jumlah Orang</span></div>
        <div class="val" id="resJumlah">—</div>
      </div>
    </div>

    <div class="divider" id="divQR">QR Check-in</div>

    <div class="qr-section">
      <div class="qr-frame">
        <img id="qrImage" src="" alt="QR Code">
      </div>
      <p class="qr-note" id="qrNote">Simpan kode QR ini dan tunjukkan saat check-in di lokasi.</p>
    </div>

    <div class="btn-group">
      <a href="index.html" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i>
        <span id="btnBack">Kembali</span>
      </a>
      <button class="btn btn-primary" onclick="downloadCard()">
        <i class="fas fa-download"></i>
        <span id="btnSave">Simpan Kartu</span>
      </button>
    </div>
  </div>

  <div class="card-footer">
    <span>© 2026 Masjid Central Okayama</span>
    <div class="dot"></div>
    <span>Eid al-Fitr 1447 H</span>
  </div>
</div>

<canvas id="downloadCanvas"></canvas>

<script>
const params = new URLSearchParams(window.location.search);
const urlLang = params.get("lang");
const lang = urlLang || (navigator.language.startsWith("ja") ? "ja" : navigator.language.startsWith("en") ? "en" : "id");

const t = {
  headTitle:     { id: "Pendaftaran Berhasil", en: "Registration Successful", ja: "登録が完了しました" },
  headSub:       { id: "Okayama Central Mosque — EID 2026", en: "Okayama Central Mosque — EID 2026", ja: "岡山中央モスク — EID 2026" },
  lblParticipantId: { id: "ID Peserta", en: "Participant ID", ja: "参加ID" },
  lblNama:       { id: "Nama", en: "Name", ja: "氏名" },
  lblHP:         { id: "No. HP", en: "Phone", ja: "電話番号" },
  lblDomisili:   { id: "Domisili", en: "City / Residence", ja: "居住地" },
  lblUsia:       { id: "Usia", en: "Age", ja: "年齢" },
  lblJK:         { id: "Jenis Kelamin", en: "Gender", ja: "性別" },
  lblJumlah:     { id: "Jumlah Orang", en: "People", ja: "人数" },
  divQR:         { id: "QR Check-in", en: "QR Check-in", ja: "QRコード" },
  qrNote:        { id: "Simpan kode QR ini dan tunjukkan saat check-in.", en: "Save this QR code and show it at check-in.", ja: "受付時にこのQRコードをご提示ください。" },
  btnBack:       { id: "Kembali", en: "Back", ja: "戻る" },
  btnSave:       { id: "Simpan Kartu", en: "Save Card", ja: "カードを保存" },
  paxLabel:      { id: "Orang", en: "People", ja: "名" },
  genderMale:    { id: "Laki-laki", en: "Male", ja: "男性" },
  genderFemale:  { id: "Perempuan", en: "Female", ja: "女性" },
};

Object.keys(t).forEach(id => {
  const el = document.getElementById(id);
  if (el) el.textContent = t[id][lang] || t[id].id;
});

const get = key => params.get(key) || "—";
document.getElementById("resID").textContent      = get("id");
document.getElementById("resNama").textContent    = get("nama_lengkap");
document.getElementById("resEmail").textContent   = get("email");
document.getElementById("resHP").textContent      = get("no_hp");
document.getElementById("resDomisili").textContent = get("domisili");
document.getElementById("resUsia").textContent    = get("usia") !== "—" ? get("usia") + " th" : "—";

let jk = get("jk");
if (jk === "Laki-laki") jk = t.genderMale[lang];
if (jk === "Perempuan") jk = t.genderFemale[lang];
document.getElementById("resJK").textContent = jk;

const jumlah = get("jumlah_orang");
document.getElementById("resJumlah").textContent = jumlah !== "—" ? jumlah + " " + t.paxLabel[lang] : "—";

const participantID = params.get("id") || "UNKNOWN";
const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(participantID)}&margin=10&color=064e3b`;
const qrImg = document.getElementById("qrImage");
qrImg.src = qrSrc;

function roundRect(ctx, x, y, w, h, r, fill, stroke) {
  if (typeof r === 'number') r = {tl: r, tr: r, br: r, bl: r};
  else {
    var defaultRadius = {tl: 0, tr: 0, br: 0, bl: 0};
    for (var side in defaultRadius) r[side] = r[side] || defaultRadius[side];
  }
  ctx.beginPath();
  ctx.moveTo(x + r.tl, y);
  ctx.lineTo(x + w - r.tr, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
  ctx.lineTo(x + w, y + h - r.br);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
  ctx.lineTo(x + r.bl, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
  ctx.lineTo(x, y + r.tl);
  ctx.quadraticCurveTo(x, y, x + r.tl, y);
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) ctx.stroke();
}

async function downloadCard() {
  const btn = document.querySelector(".btn-primary");
  btn.disabled = true;
  btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> <span>${lang === "ja" ? "生成中..." : lang === "en" ? "Generating..." : "Membuat..."}</span>`;

  try {
    const response = await fetch(qrSrc);
    const blob = await response.blob();
    const blobUrl = URL.createObjectURL(blob);
    
    const qrTemp = new Image();
    await new Promise((res, rej) => {
      qrTemp.onload = res;
      qrTemp.onerror = rej;
      qrTemp.src = blobUrl;
    });

    const canvas = document.getElementById("downloadCanvas");
    const ctx = canvas.getContext("2d");
    // PERBAIKAN: Ukuran canvas diperbesar
    const W = 720, H = 1100;
    canvas.width = W; canvas.height = H;

    // 1. Background Cream
    ctx.fillStyle = "#f1f5f9";
    ctx.fillRect(0, 0, W, H);

    // 2. Header Green Gradient
    const hdrH = 200;
    const hdrGrad = ctx.createLinearGradient(0, 0, W, hdrH);
    hdrGrad.addColorStop(0, "#064e3b");
    hdrGrad.addColorStop(1, "#059669");
    roundRect(ctx, 0, 0, W, hdrH + 40, {bl: 32, br: 32}, hdrGrad);

    // 3. Header Text & Icon
    ctx.fillStyle = "rgba(255,255,255,0.15)";
    ctx.beginPath(); ctx.arc(W/2, 65, 35, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#ffffff";
    ctx.font = "32px serif"; ctx.textAlign = "center"; ctx.fillText("✅", W/2, 77);
    ctx.font = "bold 32px Georgia, serif"; ctx.fillText(t.headTitle[lang], W/2, 135);
    ctx.fillStyle = "rgba(255,255,255,0.7)";
    ctx.font = "18px sans-serif"; ctx.fillText("Okayama Central Mosque — EID 2026", W/2, 165);

    // 4. ID Badge
    const bY = 260;
    roundRect(ctx, 40, bY, W-80, 80, 14, "#ecfdf5");
    ctx.strokeStyle = "#10b981"; ctx.lineWidth = 2;
    roundRect(ctx, 40, bY, W-80, 80, 14, null, true);
    ctx.textAlign = "left"; ctx.fillStyle = "#064e3b";
    ctx.font = "bold 12px sans-serif"; ctx.fillText((t.lblParticipantId[lang]).toUpperCase(), 65, bY + 30);
    ctx.font = "bold 28px Georgia, serif"; ctx.fillText(get("id"), 65, bY + 62);
    ctx.font = "28px sans-serif"; ctx.textAlign = "right"; ctx.fillText("🎫", W-65, bY + 52);

    // 5. Info Grid
    const infoStartY = 370;
    const items = [
      [t.lblNama[lang], get("nama_lengkap")], [t.lblHP[lang], get("no_hp")],
      ["EMAIL", get("email")], [t.lblDomisili[lang], get("domisili")],
      [t.lblUsia[lang], get("usia") !== "—" ? get("usia") + " th" : "—"], [t.lblJK[lang], jk],
      [t.lblJumlah[lang], document.getElementById("resJumlah").textContent]
    ];

    items.forEach((item, i) => {
      const isFull = i === 0 || i === 6;
      let x = 40, y = infoStartY + (i * 85), w = W-80;
      if (i > 0 && i < 6) {
        const subI = i - 1;
        x = 40 + (subI % 2) * (W/2 - 35);
        y = infoStartY + 85 + Math.floor(subI / 2) * 85;
        w = W/2 - 50;
      }
      if (i === 6) y = infoStartY + 340;

      roundRect(ctx, x, y, w, 75, 12, "#ffffff");
      ctx.strokeStyle = "#e2e8f0"; ctx.lineWidth = 1; roundRect(ctx, x, y, w, 75, 12, null, true);
      ctx.fillStyle = "#475569"; ctx.font = "bold 11px sans-serif"; ctx.textAlign = "left";
      ctx.fillText(item[0].toUpperCase(), x + 15, y + 25);
      ctx.fillStyle = "#1e293b"; ctx.font = "bold 16px sans-serif";
      ctx.fillText(item[1], x + 15, y + 55);
    });

    // 6. QR Section (PERBAIKAN: ukuran QR diperbesar, divider digeser, tambah teks instruksi)
    const qrY = 830;
    const qrSize = 200;
    const frameSize = 230;

    // Divider (garis putus-putus) di y = 820
    ctx.setLineDash([5, 5]);
    ctx.strokeStyle = "#cbd5e1";
    ctx.beginPath();
    ctx.moveTo(40, 820);
    ctx.lineTo(W - 40, 820);
    ctx.stroke();
    ctx.setLineDash([]);

    // Frame QR putih
    ctx.fillStyle = "#ffffff";
    roundRect(ctx, W/2 - frameSize/2, qrY, frameSize, frameSize, 18, "#ffffff");
    ctx.strokeStyle = "#e2e8f0";
    roundRect(ctx, W/2 - frameSize/2, qrY, frameSize, frameSize, 18, null, true);

    // Gambar QR di tengah frame
    ctx.drawImage(
      qrTemp,
      W/2 - qrSize/2,
      qrY + (frameSize - qrSize) / 2,
      qrSize,
      qrSize
    );

    // Teks instruksi di bawah QR
    ctx.fillStyle = "#475569";
    ctx.font = "14px sans-serif";
    ctx.textAlign = "center";
    let instruksiText = "";
    if (lang === "ja") instruksiText = "受付時にQRコードをご提示ください";
    else if (lang === "en") instruksiText = "Show this QR code during check-in";
    else instruksiText = "Tunjukkan QR ini saat check-in";
    ctx.fillText(instruksiText, W/2, qrY + frameSize + 35);

    // 7. Footer (digeser agar tidak terlalu mepet)
    ctx.fillStyle = "#064e3b";
    ctx.fillRect(0, H - 50, W, 50);
    ctx.fillStyle = "rgba(255,255,255,0.6)";
    ctx.font = "14px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("© 2026 Masjid Central Okayama  •  Eid al-Fitr 1447 H", W/2, H - 15);

    const safeName = get("nama_lengkap").trim().replace(/\s+/g, "_").replace(/[^a-zA-Z0-9_]/g, "");
    const link = document.createElement("a");
    link.download = `EID_2026_${safeName}.png`;
    link.href = canvas.toDataURL("image/png", 1.0);
    link.click();
    URL.revokeObjectURL(blobUrl);

  } catch (e) {
    console.error(e);
    alert("Gagal mengunduh kartu. Silakan coba lagi.");
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<i class="fas fa-download"></i> <span>${t.btnSave[lang]}</span>`;
  }
}
</script>
</body>
</html>
