<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pendaftaran Berhasil — EID 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
:root {
  --green-deep: #064e3b;
  --green-mid: #059669;
  --green-bright: #10b981;
  --green-light: #ecfdf5;
  --cream: #f1f5f9;
  --ink: #1e293b;
  --muted: #475569;
  --border: #e2e8f0;
  --radius: 24px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 16px 48px;
  position: relative;
  overflow-x: hidden;
}

/* Decorative background pattern */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle at 15% 20%, rgba(5,150,105,0.06) 0%, transparent 50%),
    radial-gradient(circle at 85% 80%, rgba(16,185,129,0.06) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* Main card */
.card {
  width: 100%;
  max-width: 480px;
  background: #fff;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  position: relative;
  z-index: 1;
  overflow: hidden;
}

/* Green top bar */
.card-header {
  background: linear-gradient(135deg, var(--green-deep) 0%, var(--green-mid) 100%);
  padding: 28px 28px 24px;
  text-align: center;
  position: relative;
}

.card-header::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0; right: 0;
  height: 24px;
  background: #fff;
  border-radius: 24px 24px 0 0;
}

.check-ring {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  border: 2px solid rgba(255,255,255,0.3);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 12px;
  font-size: 28px;
}

.card-header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  color: #fff;
  letter-spacing: -0.01em;
}

.card-header .subtitle {
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  margin-top: 4px;
}

/* Card body */
.card-body {
  padding: 24px 24px 28px;
}

/* ID Badge */
.id-badge {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--green-light);
  border: 1.5px solid var(--green-bright);
  border-radius: 14px;
  padding: 12px 16px;
  margin-bottom: 20px;
}

.id-badge .badge-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--green-deep);
  letter-spacing: .08em;
  text-transform: uppercase;
}

.id-badge .badge-value {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  color: var(--green-deep);
  letter-spacing: .04em;
}

.id-badge .badge-icon {
  font-size: 20px;
  color: var(--green-bright);
}

/* Info grid */
.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 22px;
}

.info-item {
  background: #f8fafc;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 14px;
}

.info-item.full { grid-column: 1 / -1; }

.info-item .lbl {
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: .06em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 4px;
}

.info-item .lbl i { color: var(--green-bright); font-size: 10px; }

.info-item .val {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  word-break: break-word;
}

/* Divider */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 4px 0 20px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .06em;
  text-transform: uppercase;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* QR section */
.qr-section {
  text-align: center;
  margin-bottom: 22px;
}

.qr-frame {
  width: 190px; height: 190px;
  margin: 0 auto 14px;
  background: #fff;
  border: 2px solid var(--border);
  border-radius: 20px;
  padding: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  position: relative;
}

/* Corner accents on QR frame */
.qr-frame::before, .qr-frame::after {
  content: '';
  position: absolute;
  width: 20px; height: 20px;
  border-color: var(--green-bright);
  border-style: solid;
}
.qr-frame::before { top: 8px; left: 8px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
.qr-frame::after  { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }

.qr-frame img { width: 100%; height: 100%; object-fit: contain; }

.qr-note {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.6;
  max-width: 280px;
  margin: 0 auto;
}

/* Buttons */
.btn-group {
  display: flex;
  gap: 10px;
}

.btn {
  flex: 1;
  padding: 14px;
  border-radius: 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  text-decoration: none;
  transition: all .2s ease;
}

.btn-primary {
  background: linear-gradient(135deg, var(--green-mid), var(--green-deep));
  color: #fff;
  box-shadow: 0 4px 12px rgba(5,150,105,0.3);
}

.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 16px rgba(5,150,105,0.4);
}

.btn-secondary {
  background: #fff;
  color: var(--muted);
  border: 1.5px solid var(--border);
}

.btn-secondary:hover { background: #f8fafc; }

/* Footer inside card */
.card-footer {
  background: var(--green-deep);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.card-footer span {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  letter-spacing: .04em;
}

.card-footer .dot {
  width: 3px; height: 3px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
}

/* Canvas hidden for download */
#downloadCanvas { display: none; }

/* Page fade-in */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.card { animation: fadeUp .5s ease both; }

@media(max-width:400px){
  .btn-group { flex-direction: column-reverse; }
  .info-grid { grid-template-columns: 1fr; }
  .info-item.full { grid-column: auto; }
}
</style>
</head>

<body>

<div class="card" id="mainCard">

  <!-- Header -->
  <div class="card-header">
    <div class="check-ring">✅</div>
    <h1 id="headTitle">Pendaftaran Berhasil</h1>
    <div class="subtitle" id="headSub">Okayama Central Mosque — EID 2026</div>
  </div>

  <!-- Body -->
  <div class="card-body">

    <!-- ID Badge -->
    <div class="id-badge">
      <div>
        <div class="badge-label" id="lblParticipantId">ID Peserta</div>
        <div class="badge-value" id="resID">—</div>
      </div>
      <div class="badge-icon"><i class="fas fa-ticket-alt"></i></div>
    </div>

    <!-- Info Grid -->
    <div class="info-grid">
      <div class="info-item full">
        <div class="lbl"><i class="fas fa-user"></i> <span id="lblNama">Nama</span></div>
        <div class="val" id="resNama">—</div>
      </div>
      <div class="info-item">
        <div class="lbl"><i class="fas fa-envelope"></i> Email</div>
        <div class="val" id="resEmail">—</div>
      </div>
      <div class="info-item">
        <div class="lbl"><i class="fas fa-phone"></i> <span id="lblHP">No. HP</span></div>
        <div class="val" id="resHP">—</div>
      </div>
      <div class="info-item">
        <div class="lbl"><i class="fas fa-map-marker-alt"></i> <span id="lblDomisili">Domisili</span></div>
        <div class="val" id="resDomisili">—</div>
      </div>
      <div class="info-item">
        <div class="lbl"><i class="fas fa-birthday-cake"></i> <span id="lblUsia">Usia</span></div>
        <div class="val" id="resUsia">—</div>
      </div>
      <div class="info-item">
        <div class="lbl"><i class="fas fa-venus-mars"></i> <span id="lblJK">Jenis Kelamin</span></div>
        <div class="val" id="resJK">—</div>
      </div>
      <div class="info-item full">
        <div class="lbl"><i class="fas fa-users"></i> <span id="lblJumlah">Jumlah Orang</span></div>
        <div class="val" id="resJumlah">—</div>
      </div>
    </div>

    <!-- QR Section -->
    <div class="divider" id="divQR">QR Check-in</div>

    <div class="qr-section">
      <div class="qr-frame">
        <img id="qrImage" src="" alt="QR Code">
      </div>
      <p class="qr-note" id="qrNote">Simpan kode QR ini dan tunjukkan saat check-in di lokasi.</p>
    </div>

    <!-- Buttons -->
    <div class="btn-group">
      <a href="index.html" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i>
        <span id="btnBack">Kembali</span>
      </a>
      <button class="btn btn-primary" onclick="downloadCard()">
        <i class="fas fa-download"></i>
        <span id="btnSave">Simpan Kartu</span>
      </button>
    </div>

  </div>

  <!-- Card Footer -->
  <div class="card-footer">
    <span>© 2026 Masjid Central Okayama</span>
    <div class="dot"></div>
    <span>Eid al-Fitr 1447 H</span>
  </div>
</div>

<!-- Hidden canvas for download -->
<canvas id="downloadCanvas"></canvas>

<script>
// ============ LANGUAGE DETECTION ============
const params = new URLSearchParams(window.location.search);

// Prioritize lang sent from form, fallback to browser
const urlLang = params.get("lang");
const lang = urlLang || (
  navigator.language.startsWith("ja") ? "ja" :
  navigator.language.startsWith("en") ? "en" : "id"
);

// ============ TRANSLATIONS ============
const t = {
  headTitle:     { id: "Pendaftaran Berhasil", en: "Registration Successful", ja: "登録が完了しました" },
  headSub:       { id: "Okayama Central Mosque — EID 2026", en: "Okayama Central Mosque — EID 2026", ja: "岡山中央モスク — EID 2026" },
  lblParticipantId: { id: "ID Peserta", en: "Participant ID", ja: "参加ID" },
  lblNama:       { id: "Nama", en: "Name", ja: "氏名" },
  lblHP:         { id: "No. HP", en: "Phone", ja: "電話番号" },
  lblDomisili:   { id: "Domisili", en: "City / Residence", ja: "居住地" },
  lblUsia:       { id: "Usia", en: "Age", ja: "年齢" },
  lblJK:         { id: "Jenis Kelamin", en: "Gender", ja: "性別" },
  lblJumlah:     { id: "Jumlah Orang", en: "People", ja: "人数" },
  divQR:         { id: "QR Check-in", en: "QR Check-in", ja: "QRコード" },
  qrNote:        { id: "Simpan kode QR ini dan tunjukkan saat check-in.", en: "Save this QR code and show it at check-in.", ja: "受付時にこのQRコードをご提示ください。" },
  btnBack:       { id: "Kembali", en: "Back", ja: "戻る" },
  btnSave:       { id: "Simpan Kartu", en: "Save Card", ja: "カードを保存" },
  paxLabel:      { id: "Orang", en: "People", ja: "名" },
  genderMale:    { id: "Laki-laki", en: "Male", ja: "男性" },
  genderFemale:  { id: "Perempuan", en: "Female", ja: "女性" },
};

// Apply translations
Object.keys(t).forEach(id => {
  const el = document.getElementById(id);
  if (el) el.textContent = t[id][lang] || t[id].id;
});

// ============ FILL DATA ============
const get = key => params.get(key) || "—";

document.getElementById("resID").textContent      = get("id");
document.getElementById("resNama").textContent    = get("nama_lengkap");
document.getElementById("resEmail").textContent   = get("email");
document.getElementById("resHP").textContent      = get("no_hp");
document.getElementById("resDomisili").textContent = get("domisili");
document.getElementById("resUsia").textContent    = get("usia") !== "—" ? get("usia") + " th" : "—";

// Gender translation
let jk = get("jk");
if (jk === "Laki-laki") jk = t.genderMale[lang];
if (jk === "Perempuan")  jk = t.genderFemale[lang];
document.getElementById("resJK").textContent = jk;

// Jumlah orang
const jumlah = get("jumlah_orang");
document.getElementById("resJumlah").textContent = jumlah !== "—"
  ? jumlah + " " + t.paxLabel[lang]
  : "—";

// ============ QR CODE ============
const participantID = params.get("id") || "UNKNOWN";
const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(participantID)}&margin=10&color=064e3b`;
const qrImg = document.getElementById("qrImage");
qrImg.src = qrSrc;

// ============ DOWNLOAD CARD (Canvas) ============
async function downloadCard() {
  const btn = document.querySelector(".btn-primary");
  btn.disabled = true;
  btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> <span>${lang === "ja" ? "生成中..." : lang === "en" ? "Generating..." : "Membuat..."}</span>`;

  try {
    // Wait for QR to load
    await new Promise((res, rej) => {
      if (qrImg.complete) res();
      else { qrImg.onload = res; qrImg.onerror = rej; }
    });

    const canvas = document.getElementById("downloadCanvas");
    const ctx = canvas.getContext("2d");

    const W = 640, H = 900;
    canvas.width = W;
    canvas.height = H;

    // Background (cream seperti index)
    ctx.fillStyle = "#f1f5f9";
    ctx.fillRect(0, 0, W, H);

    // Subtle bg circle
    const grad = ctx.createRadialGradient(W*0.15, H*0.15, 0, W*0.15, H*0.15, 300);
    grad.addColorStop(0, "rgba(5,150,105,0.07)");
    grad.addColorStop(1, "transparent");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // --- Header green bar (gradien #064e3b → #059669) ---
    const hdrH = 180;
    const hdrGrad = ctx.createLinearGradient(0, 0, W, hdrH);
    hdrGrad.addColorStop(0, "#064e3b");
    hdrGrad.addColorStop(1, "#059669");
    // PERBAIKAN: gunakan angka tunggal 32, bukan array
    roundRect(ctx, 0, 0, W, hdrH + 30, 32, hdrGrad);

    // Mosque pattern on header (dots)
    ctx.fillStyle = "rgba(255,255,255,0.04)";
    for (let x = 20; x < W; x += 40) {
      for (let y = 20; y < hdrH; y += 40) {
        ctx.beginPath();
        ctx.arc(x, y, 12, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Check icon circle
    ctx.fillStyle = "rgba(255,255,255,0.15)";
    ctx.beginPath();
    ctx.arc(W/2, 56, 34, 0, Math.PI * 2);
    ctx.fill();
    ctx.font = "36px serif";
    ctx.textAlign = "center";
    ctx.fillText("✅", W/2, 68);

    // Header title
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 28px Georgia, serif";
    ctx.fillText(t.headTitle[lang], W/2, 118);

    ctx.fillStyle = "rgba(255,255,255,0.6)";
    ctx.font = "500 15px sans-serif";
    ctx.fillText("Okayama Central Mosque — EID 2026", W/2, 144);

    // --- ID Badge (hijau muda) ---
    const badgeY = 210;
    roundRect(ctx, 40, badgeY, W - 80, 68, 14, "#ecfdf5");
    ctx.strokeStyle = "#10b981";
    ctx.lineWidth = 1.5;
    roundRect(ctx, 40, badgeY, W - 80, 68, 14, null, true);

    ctx.textAlign = "left";
    ctx.fillStyle = "#064e3b";
    ctx.font = "600 10px sans-serif";
    ctx.fillText((t.lblParticipantId[lang] || "ID Peserta").toUpperCase(), 60, badgeY + 22);

    ctx.fillStyle = "#064e3b";
    ctx.font = "bold 22px Georgia, serif";
    ctx.fillText(get("id"), 60, badgeY + 52);

    // Ticket icon area
    ctx.fillStyle = "#10b981";
    ctx.font = "24px sans-serif";
    ctx.textAlign = "right";
    ctx.fillText("🎫", W - 60, badgeY + 46);

    // --- Info Section ---
    const infoStartY = 306;
    const infoData = [
      [t.lblNama[lang],     get("nama_lengkap"),   "fas fa-user"],
      ["Email",              get("email"),           "fas fa-envelope"],
      [t.lblHP[lang],        get("no_hp"),           "fas fa-phone"],
      [t.lblDomisili[lang],  get("domisili"),        "fas fa-map-marker-alt"],
      [t.lblUsia[lang],      (get("usia") !== "—" ? get("usia") + " th" : "—"), "fas fa-id-card"],
      [t.lblJK[lang],        jk,                    "fas fa-venus-mars"],
      [t.lblJumlah[lang],    (get("jumlah_orang") !== "—" ? get("jumlah_orang") + " " + t.paxLabel[lang] : "—"), "fas fa-users"],
    ];

    const colW = (W - 100) / 2;
    const rowH = 70;
    const gap = 12;

    infoData.forEach((item, i) => {
      const isLast = i === infoData.length - 1;
      const col = isLast ? 0 : i % 2;
      const row = isLast ? Math.floor((infoData.length - 1) / 2) : Math.floor(i / 2);
      const itemW = isLast ? W - 100 : colW;
      const x = 40 + col * (colW + gap);
      const y = infoStartY + row * (rowH + gap);

      // Card bg
      roundRect(ctx, x, y, itemW, rowH - 2, 14, "#f8fafc");
      ctx.strokeStyle = "#e2e8f0";
      ctx.lineWidth = 1;
      roundRect(ctx, x, y, itemW, rowH - 2, 14, null, true);

      // Label icon (bullet)
      ctx.fillStyle = "#10b981";
      ctx.font = "10px sans-serif";
      ctx.textAlign = "left";
      ctx.fillText("●", x + 12, y + 20);

      ctx.fillStyle = "#475569";
      ctx.font = "600 10px sans-serif";
      ctx.fillText(item[0].toUpperCase(), x + 24, y + 20);

      // Value
      ctx.fillStyle = "#1e293b";
      ctx.font = "600 14px sans-serif";
      const maxValW = itemW - 24;
      let valText = item[1];
      while (ctx.measureText(valText).width > maxValW && valText.length > 4) {
        valText = valText.slice(0, -1);
      }
      if (valText !== item[1]) valText += "…";
      ctx.fillText(valText, x + 12, y + 48);
    });

    // --- Divider ---
    const divY = infoStartY + Math.ceil((infoData.length) / 2) * (rowH + gap) + 4;
    ctx.strokeStyle = "#e2e8f0";
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 6]);
    ctx.beginPath();
    ctx.moveTo(40, divY);
    ctx.lineTo(W - 40, divY);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = "#475569";
    ctx.font = "600 11px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("— QR Check-in —", W/2, divY + 18);

    // --- QR Code ---
    const qrSize = 220;
    const qrX = (W - qrSize) / 2;
    const qrY = divY + 32;

    // QR frame
    roundRect(ctx, qrX - 14, qrY - 14, qrSize + 28, qrSize + 28, 20, "#ffffff");
    ctx.strokeStyle = "#e2e8f0";
    ctx.lineWidth = 2;
    roundRect(ctx, qrX - 14, qrY - 14, qrSize + 28, qrSize + 28, 20, null, true);

    // Corner accents
    ctx.strokeStyle = "#10b981";
    ctx.lineWidth = 3;
    const cAcc = 18;
    ctx.beginPath(); ctx.moveTo(qrX - 10, qrY - 10 + cAcc); ctx.lineTo(qrX - 10, qrY - 10); ctx.lineTo(qrX - 10 + cAcc, qrY - 10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(qrX + qrSize + 10, qrY + qrSize + 10 - cAcc); ctx.lineTo(qrX + qrSize + 10, qrY + qrSize + 10); ctx.lineTo(qrX + qrSize + 10 - cAcc, qrY + qrSize + 10); ctx.stroke();

    // Draw QR image
    ctx.drawImage(qrImg, qrX, qrY, qrSize, qrSize);

    // QR note
    ctx.fillStyle = "#475569";
    ctx.font = "13px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(t.qrNote[lang], W/2, qrY + qrSize + 36);

    // --- Footer ---
    const ftY = H - 50;
    ctx.fillStyle = "#064e3b";
    ctx.fillRect(0, ftY, W, 50);
    ctx.fillStyle = "rgba(255,255,255,0.5)";
    ctx.font = "12px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("© 2026 Masjid Central Okayama  •  Eid al-Fitr 1447 H", W/2, ftY + 30);

    // ---- DOWNLOAD ----
    const rawName = params.get("nama_lengkap") || "Peserta";
    const safeName = rawName.trim().replace(/\s+/g, "_").replace(/[^a-zA-Z0-9_]/g, "");
    const fileName = `QR_EID_2026_${safeName}.png`;

    canvas.toBlob(blob => {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
    });

  } catch (err) {
    console.error(err);
    alert(lang === "ja" ? "ダウンロードに失敗しました" : lang === "en" ? "Download failed" : "Gagal mengunduh. Coba lagi.");
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<i class="fas fa-download"></i> <span>${t.btnSave[lang]}</span>`;
  }
}

// ============ HELPER: Rounded rect on Canvas ============
function roundRect(ctx, x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) ctx.stroke();
}
